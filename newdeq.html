<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - DEQCore.ai Injector</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Master Admin: Client Injector</h1>
                <p class="text-gray-400">Daftarkan klien dan suntikkan Karakter serta Skill pilihan</p>
            </div>
            <div class="space-x-2">
                <a href="/character" class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded text-sm font-semibold transition">Character Lib</a>
                <a href="/skill" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded text-sm font-semibold transition">Skill Lib</a>
                <a href="/" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-semibold transition">Home</a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Form Registrasi & Injeksi (Kiri) -->
            <div class="lg:col-span-5 bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl">
                <h2 class="text-xl font-bold mb-6 text-blue-300 border-b border-gray-700 pb-2 text-center">Registration & Injection Form</h2>
                
                <form id="clientForm" class="space-y-4">
                    <!-- Data Dasar -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Nama Bot / Peruntukan</label>
                            <input type="text" id="namaBot" placeholder="Bot Sales Roti" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Nama Owner</label>
                            <input type="text" id="namaOwner" placeholder="Fahmi EQ" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Email</label>
                            <input type="email" id="email" placeholder="owner@mail.com" required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">WhatsApp</label>
                            <input type="text" id="noWa" placeholder="0812..." required class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none">
                        </div>
                    </div>

                    <hr class="border-gray-700 my-4">

                    <!-- Injeksi Karakter (Pilih dari Library) -->
                    <div>
                        <label class="block text-xs font-bold text-purple-400 mb-2 uppercase">Inject Characters (Max 5)</label>
                        <div id="characterSelect" class="bg-gray-900 border border-gray-700 rounded p-3 h-32 overflow-y-auto space-y-2 text-xs">
                            <!-- List Karakter muncul di sini -->
                        </div>
                    </div>

                    <!-- Injeksi Skill -->
                    <div>
                        <label class="block text-xs font-bold text-green-400 mb-2 uppercase">Inject Skills</label>
                        <div id="skillSelect" class="bg-gray-900 border border-gray-700 rounded p-3 h-32 overflow-y-auto space-y-2 text-xs">
                            <!-- List Skill muncul di sini -->
                        </div>
                    </div>

                    <!-- 10 Poin SOP Admin -->
                    <div>
                        <label class="block text-xs font-bold text-orange-400 mb-2 uppercase">Admin SOP Instructions (10 Poin Paragraf)</label>
                        <textarea id="adminInstructions" rows="4" placeholder="Tuliskan aturan baku untuk bot ini..." class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-xs focus:border-orange-500 outline-none"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg transition duration-200 uppercase tracking-widest text-sm">
                        Create & Inject Client
                    </button>
                </form>
            </div>

            <!-- Database Klien (Kanan) -->
            <div class="lg:col-span-7 bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl overflow-hidden">
                <h2 class="text-xl font-bold mb-6 text-gray-300 border-b border-gray-700 pb-2">Active Client Database</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-gray-900 text-gray-400">
                            <tr>
                                <th class="px-4 py-3">Client/Bot</th>
                                <th class="px-4 py-3">Token Access</th>
                                <th class="px-4 py-3">Injections</th>
                                <th class="px-4 py-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="clientTableBody" class="divide-y divide-gray-700">
                            <!-- Data klien -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Load Karakter & Skill ke Form
        async function loadLibraries() {
            // Load Characters
            const charRes = await fetch('/api/characters');
            const chars = await charRes.json();
            const charDiv = document.getElementById('characterSelect');
            charDiv.innerHTML = chars.map(c => `
                <label class="flex items-center space-x-2 p-1 hover:bg-gray-800 rounded cursor-pointer">
                    <input type="checkbox" name="chars" value="${c.name}" class="rounded border-gray-700">
                    <span>${c.name}</span>
                </label>
            `).join('') || '<p class="text-gray-600 italic">Library kosong</p>';

            // Load Skills
            const skillRes = await fetch('/api/skills');
            const skills = await skillRes.json();
            const skillDiv = document.getElementById('skillSelect');
            skillDiv.innerHTML = skills.map(s => `
                <label class="flex items-center space-x-2 p-1 hover:bg-gray-800 rounded cursor-pointer">
                    <input type="checkbox" name="skills" value="${s.name}" class="rounded border-gray-700">
                    <span>${s.name}</span>
                </label>
            `).join('') || '<p class="text-gray-600 italic">Library kosong</p>';
        }

        // Load Daftar Klien
        async function fetchClients() {
            const response = await fetch('/api/clients');
            const clients = await response.json();
            const tableBody = document.getElementById('clientTableBody');
            tableBody.innerHTML = clients.map(c => `
                <tr class="hover:bg-gray-700/50 transition border-b border-gray-700/50">
                    <td class="px-4 py-4">
                        <div class="font-bold text-blue-400">${c.nama_bot}</div>
                        <div class="text-[10px] text-gray-500">${c.nama_owner}</div>
                    </td>
                    <td class="px-4 py-4 font-mono text-green-400">${c.token}</td>
                    <td class="px-4 py-4 text-[10px] text-gray-400 max-w-xs truncate">
                        ${c.assigned_characters || 'No Char'} | ${c.admin_instructions ? 'SOP Active' : 'No SOP'}
                    </td>
                    <td class="px-4 py-4">
                        <span class="bg-green-900/30 text-green-500 px-2 py-0.5 rounded text-[10px] font-bold uppercase">${c.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        // Simpan Client Baru dengan Injeksi
        document.getElementById('clientForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Ambil karakter yang dipilih
            const selectedChars = Array.from(document.querySelectorAll('input[name="chars"]:checked')).map(cb => cb.value).join(', ');
            
            const clientData = {
                nama_bot: document.getElementById('namaBot').value,
                nama_owner: document.getElementById('namaOwner').value,
                email: document.getElementById('email').value,
                no_wa: document.getElementById('noWa').value,
                assigned_characters: selectedChars,
                admin_instructions: document.getElementById('adminInstructions').value
            };

            try {
                const response = await fetch('/api/clients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(clientData)
                });

                if (response.ok) {
                    document.getElementById('clientForm').reset();
                    loadLibraries();
                    fetchClients();
                    alert("Klien Berhasil Dibuat & Diinjeksi!");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        });

        window.onload = () => {
            loadLibraries();
            fetchClients();
        };
    </script>
</body>
</html>
