<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Deqbot - Mid-Line Arrow Mind Map</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            width: 5000px;
            height: 5000px;
            overflow: auto;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .connection-line {
            stroke: #ff5e78;
            stroke-width: 2;
            fill: none;
            cursor: pointer;
            pointer-events: stroke;
        }

        .arrow-path {
            fill: #ff5e78;
            cursor: pointer;
            pointer-events: all;
        }

        .node {
            position: absolute;
            background: white;
            border: 2px solid #ff5e78;
            border-radius: 8px;
            padding: 10px;
            width: 180px;
            min-height: 80px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: grab;
            user-select: none;
        }

        .node:active { cursor: grabbing; }
        .node.root { background: #ff5e78; color: white; border: none; }

        .node-text {
            border: none;
            outline: none;
            background: transparent;
            text-align: center;
            font-weight: bold;
            width: 100%;
            height: 60px;
            color: inherit;
            resize: none;
            overflow: hidden;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.4;
        }

        .controls {
            margin-top: 5px;
            display: flex;
            justify-content: center;
            gap: 2px;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 3px;
            padding: 2px 5px;
            font-size: 11px;
            color: white;
            font-weight: bold;
        }

        .btn-up, .btn-down { background: #007bff; }
        .btn-left, .btn-right { background: #28a745; }
        .btn-del { background: #dc3545; }
        .btn-hide { background: #ffc107; color: black; }

        .hidden-node { display: none !important; }
    </style>
</head>
<body>

<div id="canvas-container">
    <svg id="line-svg"></svg>
    
    <div class="node root" id="node-root" style="top: 2500px; left: 2500px;" onmousedown="startDrag(event, 'node-root')" ontouchstart="startDrag(event, 'node-root')">
        <textarea class="node-text">OTAK QUANTUM DEQBOT</textarea>
        <div class="controls">
            <button class="btn btn-up" onclick="addNode('node-root', 'up')">↑</button>
            <button class="btn btn-down" onclick="addNode('node-root', 'down')">↓</button>
            <button class="btn btn-left" onclick="addNode('node-root', 'left')">←</button>
            <button class="btn btn-right" onclick="addNode('node-root', 'right')">→</button>
        </div>
    </div>
</div>

<script>
    let nodeCount = 0;
    const nodes = {};
    const branchTracker = {}; 
    let activeNode = null;
    let offset = { x: 0, y: 0 };

    function addNode(parentId, direction) {
        event.stopPropagation();
        if (!branchTracker[parentId]) {
            branchTracker[parentId] = { up: 0, down: 0, left: 0, right: 0 };
        }

        const id = 'node-' + (++nodeCount);
        const newNode = document.createElement('div');
        newNode.className = 'node';
        newNode.id = id;

        newNode.onmousedown = (e) => startDrag(e, id);
        newNode.ontouchstart = (e) => startDrag(e, id);

        const branchIndex = branchTracker[parentId][direction];
        branchTracker[parentId][direction]++;

        const spreadAmount = 220; 
        const distance = 280; 
        const spreadOffset = (branchIndex % 2 === 0 ? branchIndex / 2 : -(branchIndex + 1) / 2) * spreadAmount;

        const parentEl = document.getElementById(parentId);
        let top = parentEl.offsetTop;
        let left = parentEl.offsetLeft;

        if (direction === 'up') { top -= distance; left += spreadOffset; }
        else if (direction === 'down') { top += distance; left += spreadOffset; }
        else if (direction === 'left') { left -= (distance + 100); top += spreadOffset; }
        else if (direction === 'right') { left += (distance + 100); top += spreadOffset; }

        newNode.style.top = top + 'px';
        newNode.style.left = left + 'px';

        newNode.innerHTML = `
            <textarea class="node-text" placeholder="Isi teks..."></textarea>
            <div class="controls">
                <button class="btn btn-up" onclick="addNode('${id}', 'up')">↑</button>
                <button class="btn btn-down" onclick="addNode('${id}', 'down')">↓</button>
                <button class="btn btn-left" onclick="addNode('${id}', 'left')">←</button>
                <button class="btn btn-right" onclick="addNode('${id}', 'right')">→</button>
                <button class="btn btn-del" onclick="removeNode('${id}')">x</button>
                <button class="btn btn-hide" onclick="toggleSubtree('${id}')">=</button>
            </div>
        `;

        document.getElementById('canvas-container').appendChild(newNode);
        nodes[id] = { parentId: parentId, visible: true, flip: false };
        drawLines();
    }

    function toggleDirection(id) {
        nodes[id].flip = !nodes[id].flip;
        drawLines();
    }

    function startDrag(e, id) {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'TEXTAREA') return;
        activeNode = document.getElementById(id);
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        offset.x = clientX - activeNode.offsetLeft;
        offset.y = clientY - activeNode.offsetTop;
        document.onmousemove = drag;
        document.onmouseup = stopDrag;
        document.ontouchmove = drag;
        document.ontouchend = stopDrag;
    }

    function drag(e) {
        if (activeNode) {
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            activeNode.style.left = (clientX - offset.x) + 'px';
            activeNode.style.top = (clientY - offset.y) + 'px';
            drawLines();
        }
    }

    function stopDrag() {
        activeNode = null;
        document.onmousemove = null; document.onmouseup = null;
        document.ontouchmove = null; document.ontouchend = null;
    }

    function removeNode(id) {
        event.stopPropagation();
        for (const childId in nodes) { if (nodes[childId].parentId === id) removeNode(childId); }
        const el = document.getElementById(id);
        if (el) el.remove();
        delete nodes[id];
        drawLines();
    }

    function toggleSubtree(id) {
        event.stopPropagation();
        for (const childId in nodes) {
            if (nodes[childId].parentId === id) {
                nodes[childId].visible = !nodes[childId].visible;
                toggleVisibilityRecursive(childId, nodes[childId].visible);
            }
        }
        drawLines();
    }

    function toggleVisibilityRecursive(id, state) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('hidden-node', !state);
        nodes[id].visible = state;
        for (const childId in nodes) { if (nodes[childId].parentId === id) toggleVisibilityRecursive(childId, state); }
    }

    function drawLines() {
        const svg = document.getElementById('line-svg');
        svg.innerHTML = '';

        for (const id in nodes) {
            const child = document.getElementById(id);
            const parent = document.getElementById(nodes[id].parentId);
            
            if (child && parent && nodes[id].visible && !parent.classList.contains('hidden-node')) {
                const x1 = parent.offsetLeft + (parent.offsetWidth / 2);
                const y1 = parent.offsetTop + (parent.offsetHeight / 2);
                const x2 = child.offsetLeft + (child.offsetWidth / 2);
                const y2 = child.offsetTop + (child.offsetHeight / 2);

                // Buat Garis Utama
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1);
                line.setAttribute("y1", y1);
                line.setAttribute("x2", x2);
                line.setAttribute("y2", y2);
                line.setAttribute("class", "connection-line");
                line.onclick = () => toggleDirection(id);
                svg.appendChild(line);

                // Buat Panah di Tengah Garis
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2;
                const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
                const finalAngle = nodes[id].flip ? angle + 180 : angle;

                const arrow = document.createElementNS("http://www.w3.org/2000/svg", "path");
                // Bentuk panah kecil: segitiga (M=Move, L=Line, Z=Close)
                arrow.setAttribute("d", "M -8,-5 L 2,0 L -8,5 Z");
                arrow.setAttribute("class", "arrow-path");
                arrow.setAttribute("transform", `translate(${midX}, ${midY}) rotate(${finalAngle})`);
                arrow.onclick = () => toggleDirection(id);
                svg.appendChild(arrow);
            }
        }
    }

    window.onload = () => {
        const root = document.getElementById('node-root');
        window.scrollTo(root.offsetLeft - window.innerWidth/2 + 90, root.offsetTop - window.innerHeight/2);
    };
</script>

</body>
</html>
