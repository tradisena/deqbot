<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DEQBOT TASK</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#151515;
    padding:15px;
    border-bottom:1px solid #333;
}

.left-actions,
.right-actions{
    display:flex;
    gap:10px;
}

.btn{
    background:#00ffaa;
    color:black;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    display:flex;
    height:calc(100vh - 70px);
}

.sidebar{
    width:260px;
    background:#181818;
    border-right:1px solid #333;
    overflow:auto;
}

.task-item{
    padding:15px;
    border-bottom:1px solid #2a2a2a;
}

.task-item-title{
    cursor:pointer;
    font-weight:bold;
    line-height:1.5;
}

.export-btn{
    margin-top:10px;
    background:#0099ff;
    padding:5px 10px;
    border-radius:6px;
    display:inline-block;
    cursor:pointer;
}

.content{
    flex:1;
    overflow:auto;
    padding:20px;
}

.dashboard{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.task-card{
    background:#181818;
    border:1px solid #333;
    padding:20px;
    border-radius:10px;
    cursor:pointer;
}

.task-card:hover{
    border-color:#00ffaa;
}

.card-title{
    color:#999;
    font-size:12px;
    margin-top:8px;
    margin-bottom:10px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#1d1d1d;
    color:white;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
}

.save-btn{
    width:100%;
    background:#00ffaa;
    color:black;
    padding:15px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.category-list{
    margin-top:20px;
}

.category-item{
    background:#181818;
    padding:15px;
    border-radius:8px;
    margin-bottom:10px;
    border:1px solid #333;
}

.read-box{
    background:#181818;
    padding:20px;
    border-radius:10px;
    border:1px solid #333;
}

.info-box{
    background:#111;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

.info-title{
    color:#00ffaa;
    margin-bottom:8px;
    font-weight:bold;
}

.edit-btn{
    margin-top:20px;
    background:#ffaa00;
    color:black;
    padding:12px 20px;
    border-radius:8px;
    display:inline-block;
    cursor:pointer;
    font-weight:bold;
}

.ss-preview{
    max-width:100%;
    border-radius:10px;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="topbar">

    <div class="left-actions">

        <div class="btn">
            ☰ MENU
        </div>

    </div>

    <h2>DEQBOT TASK MANAGER</h2>

    <div class="right-actions">

        <div class="btn"
        onclick="goHome()">

            HOME

        </div>

        <div class="btn"
        onclick="showCategoryForm()">

            + KATEGORI

        </div>

        <div class="btn"
        onclick="showForm()">

            + TASK

        </div>

    </div>

</div>

<div class="container">

    <div class="sidebar">

        <div id="task-list"></div>

    </div>

    <div class="content"
    id="content">

        <div class="dashboard"
        id="dashboard"></div>

    </div>

</div>

<script>

let allTasks = [];
let allCategories = [];


async function loadTasks(){

    const response =
    await fetch("/get_tasks");

    const tasks =
    await response.json();

    allTasks = tasks;

    loadSidebar(tasks);

    loadDashboard(tasks);

}


async function loadCategories(){

    const response =
    await fetch("/get_categories");

    const categories =
    await response.json();

    allCategories = categories;

}


function loadSidebar(tasks){

    const taskList =
    document.getElementById("task-list");

    taskList.innerHTML = "";

    tasks.forEach(task=>{

        taskList.innerHTML += `

        <div class="task-item">

            <div class="task-item-title"
            onclick="viewTask(${task.id})">

                ${task.no_task}<br>
                ${task.judul}

            </div>

        </div>

        `;

    });

}


function limitWords(text,maxWords=5){

    if(!text) return '';

    const words = text.split(' ');

    return words
    .slice(0,maxWords)
    .join(' ');

}


function loadDashboard(tasks){

    const dashboard =
    document.getElementById("dashboard");

    dashboard.innerHTML = "";

    tasks.forEach(task=>{

        dashboard.innerHTML += `

        <div class="task-card"
        onclick="viewTask(${task.id})">

            <h2>${task.no_task}</h2>

            <div class="card-title">

                ${limitWords(task.judul)}

            </div>

            <p>Kategori :
            ${task.kategori || '-'}</p>

            <p>Status :
            ${task.status}</p>

            <p>Deadline :
            ${task.date_finish || '-'}</p>

        </div>

        `;

    });

}


function goHome(){

    document.getElementById("content")
    .innerHTML = `

    <div class="dashboard"
    id="dashboard"></div>

    `;

    loadDashboard(allTasks);

}


function showCategoryForm(){

    document.getElementById("content")
    .innerHTML = `

    <h2>CREATE KATEGORI</h2>

    <label>Nama Kategori</label>

    <input type="text"
    id="nama_kategori">

    <button class="save-btn"
    onclick="saveCategory()">

        SAVE KATEGORI

    </button>

    <div class="category-list"
    id="category-list">

    </div>

    `;

    renderCategoryList();

}


function renderCategoryList(){

    const categoryList =
    document.getElementById("category-list");

    if(!categoryList) return;

    categoryList.innerHTML = "";

    allCategories.forEach(cat=>{

        categoryList.innerHTML += `

        <div class="category-item">

            ${cat.id}.
            ${cat.nama_kategori}

        </div>

        `;

    });

}


async function saveCategory(){

    const nama_kategori =
    document.getElementById(
        "nama_kategori"
    ).value;

    const response =
    await fetch("/save_category",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            nama_kategori
        })

    });

    const result =
    await response.json();

    alert(result.message);

    await loadCategories();

    renderCategoryList();

}


function showForm(task=null){

    let kategoriOptions = '';

    allCategories.forEach(cat=>{

        kategoriOptions += `

        <option
        value="${cat.nama_kategori}"

        ${
            task?.kategori==
            cat.nama_kategori
            ? 'selected'
            : ''
        }>

            ${cat.nama_kategori}

        </option>

        `;

    });

    document.getElementById("content")
    .innerHTML = `

    <input type="hidden"
    id="task_id"
    value="${task ? task.id : ''}">

    <label>No Task</label>

    <input type="text"
    id="no_task"
    value="${task ? task.no_task : ''}">

    <label>Jenis Kategori</label>

    <select id="kategori">

        ${kategoriOptions}

    </select>

    <label>Judul</label>

    <input type="text"
    id="judul"
    value="${task ? task.judul : ''}">

    <label>Detail</label>

    <textarea id="detail">${task ? task.detail : ''}</textarea>

    <label>Detail Tambahan</label>

    <textarea id="detail_tambahan">${task ? task.detail_tambahan : ''}</textarea>

    <label>File yg di Update</label>

    <textarea id="file_update">${task ? task.file_update : ''}</textarea>

    <label>Sumber File Master</label>

    <input type="text"
    id="sumber_master"
    value="${task ? task.sumber_master : ''}">

    <label>Metode</label>

    <input type="text"
    id="metode"
    value="${task ? task.metode : ''}">

    <label>Human / AI Agent</label>

    <input type="text"
    id="ai_agent"
    value="${task ? task.ai_agent : ''}">

    <label>Status</label>

    <select id="status">

        <option ${
            task?.status=='Pending'
            ? 'selected' : ''
        }>Pending</option>

        <option ${
            task?.status=='Finish'
            ? 'selected' : ''
        }>Finish</option>

    </select>

    <label>Github Update</label>

    <select id="github_update">

        <option ${
            task?.github_update=='No'
            ? 'selected' : ''
        }>No</option>

        <option ${
            task?.github_update=='Yes'
            ? 'selected' : ''
        }>Yes</option>

    </select>

    <label>Deadline</label>

    <input type="date"
    id="date_finish"
    value="${task ? task.date_finish : ''}">

    <label>SS Design UI</label>

    <input type="file"
    id="ss_design">

    <label>Kendala</label>

    <textarea id="kendala">${task ? task.kendala : ''}</textarea>

    <button class="save-btn"
    onclick="saveTask()">

        SAVE TASK

    </button>

    `;

}


async function saveTask(){

    const formData = new FormData();

    formData.append(
        "task_id",
        document.getElementById("task_id").value
    );

    formData.append(
        "no_task",
        document.getElementById("no_task").value
    );

    formData.append(
        "kategori",
        document.getElementById("kategori").value
    );

    formData.append(
        "judul",
        document.getElementById("judul").value
    );

    formData.append(
        "detail",
        document.getElementById("detail").value
    );

    formData.append(
        "detail_tambahan",
        document.getElementById(
            "detail_tambahan"
        ).value
    );

    formData.append(
        "file_update",
        document.getElementById(
            "file_update"
        ).value
    );

    formData.append(
        "sumber_master",
        document.getElementById(
            "sumber_master"
        ).value
    );

    formData.append(
        "metode",
        document.getElementById(
            "metode"
        ).value
    );

    formData.append(
        "ai_agent",
        document.getElementById(
            "ai_agent"
        ).value
    );

    formData.append(
        "status",
        document.getElementById(
            "status"
        ).value
    );

    formData.append(
        "github_update",
        document.getElementById(
            "github_update"
        ).value
    );

    formData.append(
        "date_finish",
        document.getElementById(
            "date_finish"
        ).value
    );

    formData.append(
        "kendala",
        document.getElementById(
            "kendala"
        ).value
    );

    const fileInput =
    document.getElementById(
        "ss_design"
    );

    if(fileInput.files.length > 0){

        formData.append(
            "ss_design",
            fileInput.files[0]
        );

    }

    const response =
    await fetch("/save_task",{

        method:"POST",
        body:formData

    });

    const result =
    await response.json();

    alert(result.message);

    await loadTasks();

    goHome();

}


function viewTask(id){

    const task =
    allTasks.find(t=>t.id==id);

    document.getElementById("content")
    .innerHTML = `

    <div class="read-box">

        <h2>${task.no_task}</h2>

        <h3>${task.judul}</h3>

        <div class="info-box">

            <div class="info-title">
                KATEGORI
            </div>

            ${task.kategori}

        </div>

        <div class="info-box">

            <div class="info-title">
                DETAIL
            </div>

            ${task.detail}

        </div>

        <div class="info-box">

            <div class="info-title">
                STATUS
            </div>

            ${task.status}

        </div>

        ${
            task.ss_design
            ?
            `

            <img class="ss-preview"
            src="/uploads/${task.ss_design}">

            `
            :
            ''
        }

        <div class="edit-btn"
        onclick='showForm(${JSON.stringify(task)})'>

            EDIT TASK

        </div>

    </div>

    `;

}


async function init(){

    await loadCategories();

    await loadTasks();

}

init();

</script>

</body>
</html>
