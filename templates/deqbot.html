<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - DEQCore.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div id="loginSection" class="w-full max-w-md bg-gray-800 rounded-xl shadow-2xl overflow-hidden border border-gray-700">
        <div class="p-8 text-center">
            <h2 class="text-2xl font-bold text-white mb-6">Secure Client Portal</h2>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="clientEmail" placeholder="Email Anda" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input type="password" id="clientToken" placeholder="Token Akses" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition-colors">Masuk Ke Sistem</button>
            </form>
            <p class="mt-4 text-xs text-gray-500 italic uppercase tracking-tighter">Authorized Personnel Only</p>
        </div>
    </div>

    <div id="mainSection" class="hidden w-full max-w-6xl h-[90vh] bg-gray-800 rounded-2xl shadow-2xl overflow-hidden flex border border-gray-700">
        
        <aside class="w-80 bg-gray-900 border-r border-gray-700 flex flex-col">
            <div class="p-4 border-b border-gray-700 bg-gray-900/80">
                <h3 class="font-bold text-emerald-400 uppercase text-xs tracking-widest mb-2">List Kontak Prospek</h3>
                <div class="max-h-40 overflow-y-auto text-[10px] border border-gray-700 rounded">
                    <table class="w-full">
                        <thead class="bg-gray-800 text-gray-300">
                            <tr>
                                <th class="p-1 text-left">Nama</th>
                                <th class="p-1 text-left">NoHP</th>
                                <th class="p-1 text-left">Keterangan</th>
                            </tr>
                        </thead>
                        <tbody id="prospectList" class="text-gray-200"></tbody>
                    </table>
                </div>
            </div>
            <div class="p-6 border-b border-gray-700 bg-gray-900/50">
                <h3 class="font-bold text-blue-400 uppercase text-xs tracking-widest mb-1">Business Identity</h3>
                <p class="text-[10px] text-gray-500 uppercase">Lengkapi 20 Informasi Dasar</p>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                <div id="businessForm" class="space-y-3">
                    <script>
                        const labels = [
                            "Nama Bisnis", "Jenis Layanan", "Alamat Pusat", "Jam Operasional", 
                            "Link Website", "Kontak WA Admin", "Visi Utama", "Misi Utama", 
                            "Target Audiens", "Pesaing Utama", "Keunggulan Produk", "Harga Terendah", 
                            "Harga Tertinggi", "Metode Pembayaran", "Area Pengiriman", "Lama Garansi", 
                            "SOP Komplain", "Diskon Member", "Tahun Berdiri", "Nama Owner"
                        ];
                        labels.forEach((l, i) => {
                            document.write(`
                                <div>
                                    <label class="text-[9px] text-gray-500 uppercase mb-1 block">${i+1}. ${l}</label>
                                    <input type="text" data-idx="${i}" class="biz-input w-full bg-gray-800 border border-gray-700 rounded p-2 text-xs outline-none focus:border-blue-500">
                                </div>
                            `);
                        });
                    </script>
                </div>
            </div>
            
            <div class="p-4 border-t border-gray-700">
                <button id="btnSync" class="w-full bg-gray-800 border border-blue-600/30 text-blue-400 py-2 rounded text-[10px] font-bold uppercase hover:bg-blue-600 hover:text-white transition-all">
                    Sync Info Ke Backend
                </button>
            </div>
        </aside>

        <section class="flex-1 flex flex-col bg-gray-900">
            <header class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900/80 backdrop-blur">
                <div class="flex items-center space-x-3">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-gray-300">Terminal AI Aktif</span>
                </div>
                <div class="flex items-center gap-3">
                    <button id="btnExport" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest hover:text-blue-300">Export</button>
                    <button id="btnClearHistory" class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest hover:text-yellow-400">Clear</button>
                    <button id="btnLogout" class="text-[10px] text-red-500 font-bold uppercase tracking-widest hover:text-red-400">Logout</button>
                </div>
            </header>

            <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-hide text-sm">
                <div class="mb-4">
                    <div class="text-xs text-green-400 font-bold uppercase mb-1">DEQCore AI</div>
                    <div class="bg-gray-700/50 p-3 rounded-lg rounded-tl-none border border-gray-600 text-sm text-gray-200">
                        Sistem Berhasil Terhubung. Silakan test instruksi karakter Anda.
                    </div>
                </div>
            </div>

            <form id="chatForm" class="p-4 bg-gray-800 border-t border-gray-700">
                <div class="relative">
                    <input type="text" id="userInput" placeholder="Ketik instruksi..." class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-4 pr-12 text-sm outline-none focus:border-blue-500 transition-all">
                    <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-blue-500 hover:text-blue-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </form>
        </section>
    </div>

    <script>
        let currentToken = "";
        const SESSION_KEY = "deqbot_client_session";
        const loginSection = document.getElementById('loginSection');
        const mainSection = document.getElementById('mainSection');
        const loginForm = document.getElementById('loginForm');
        const chatForm = document.getElementById('chatForm');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        function openMainSection() {
            loginSection.classList.add('hidden');
            mainSection.classList.remove('hidden');
            mainSection.classList.add('flex');
        }

        function saveSession(email, token) {
            localStorage.setItem(SESSION_KEY, JSON.stringify({ email, token }));
        }

        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }

        function renderBot(text) {
            chatBox.innerHTML += `
                <div class="mb-4">
                    <div class="text-xs text-green-400 font-bold uppercase mb-1">DEQCore AI</div>
                    <div class="bg-gray-700/50 p-3 rounded-lg rounded-tl-none border border-gray-600 text-sm text-gray-200 shadow-md">
                        ${text}
                    </div>
                </div>
            `;
        }

        function renderUser(text) {
            chatBox.innerHTML += `
                <div class="flex flex-col items-end mb-4">
                    <div class="bg-blue-600 p-3 rounded-lg rounded-tr-none text-sm text-white shadow-lg">
                        ${text}
                    </div>
                </div>
            `;
        }

        function setBusinessInputs(paragraph) {
            const inputs = document.querySelectorAll('.biz-input');
            if (!paragraph) return;
            const lines = paragraph.split('\n').map(l => l.trim()).filter(Boolean);
            lines.forEach(line => {
                const found = labels.findIndex(lbl => line.toLowerCase().startsWith(lbl.toLowerCase() + ':'));
                if (found >= 0 && inputs[found]) {
                    inputs[found].value = line.split(':').slice(1).join(':').trim();
                }
            });
        }

        function parseProspectInput(text) {
            const parts = text.trim().split(/\s+/);
            if (parts.length < 3) return null;
            const phoneIdx = parts.findIndex(p => /^[0-9+\-]{8,16}$/.test(p));
            if (phoneIdx <= 0 || phoneIdx === parts.length - 1) return null;
            const nama = parts.slice(0, phoneIdx).join(' ').trim();
            const nohp = parts[phoneIdx].trim();
            const keterangan = parts.slice(phoneIdx + 1).join(' ').trim();
            if (!nama || !nohp || !keterangan) return null;
            return { nama, nohp, keterangan };
        }

        function renderProspects(rows) {
            const body = document.getElementById('prospectList');
            if (!rows.length) {
                body.innerHTML = `<tr><td colspan="3" class="p-2 text-center text-gray-500 italic">Belum ada data</td></tr>`;
                return;
            }
            body.innerHTML = rows.map(r => `
                <tr class="border-t border-gray-800">
                    <td class="p-1">${r.nama}</td>
                    <td class="p-1">${r.nohp}</td>
                    <td class="p-1">${r.keterangan}</td>
                </tr>
            `).join('');
        }

        async function loadProspects() {
            try {
                const res = await fetch('/api/client/prospects', { headers: { 'x-deq-key': currentToken } });
                if (!res.ok) return renderProspects([]);
                const data = await res.json();
                renderProspects(data);
            } catch {
                renderProspects([]);
            }
        }

        async function loadClientMemory() {
            try {
                const [profileRes, historyRes] = await Promise.all([
                    fetch('/api/client/profile', { headers: { 'x-deq-key': currentToken } }),
                    fetch('/api/client/history', { headers: { 'x-deq-key': currentToken } })
                ]);

                if (profileRes.ok) {
                    const profile = await profileRes.json();
                    document.getElementById('clientEmail').value = profile.email || document.getElementById('clientEmail').value;
                    setBusinessInputs(profile.business_identity || "");
                }

                if (historyRes.ok) {
                    const history = await historyRes.json();
                    if (history.length > 0) {
                        chatBox.innerHTML = "";
                        history.forEach(item => item.role === "user" ? renderUser(item.message) : renderBot(item.message));
                    }
                }
                await loadProspects();
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                console.error("Load memory failed", e);
            }
        }

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('clientEmail').value.trim();
            const token = document.getElementById('clientToken').value.trim();
            currentToken = token;
            saveSession(email, token);
            openMainSection();
            await loadClientMemory();
        };

        document.getElementById('btnSync').onclick = async () => {
            const inputs = document.querySelectorAll('.biz-input');
            let fullParagraph = "INFORMASI BISNIS KLIEN:\n";
            inputs.forEach((input, i) => {
                fullParagraph += `${labels[i]}: ${input.value || 'N/A'}\n`;
            });

            try {
                await fetch('/api/client/profile', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-deq-key': currentToken 
                    },
                    body: JSON.stringify({
                        email: document.getElementById('clientEmail').value,
                        business_identity: fullParagraph
                    })
                });
                alert("Info Berhasil Disinkronkan.");
            } catch (e) { console.error("Sync Error", e); }
        };

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if(!text) return;

            renderUser(text);

            const parsedProspect = parseProspectInput(text);
            if (parsedProspect) {
                fetch('/api/client/prospects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-deq-key': currentToken },
                    body: JSON.stringify(parsedProspect)
                }).then(loadProspects).catch(() => {});
            }

            fetch('/api/client/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-deq-key': currentToken },
                body: JSON.stringify({ role: 'user', message: text })
            }).catch(() => {});
            
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/v1/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'x-deq-key': currentToken 
                    },
                    body: JSON.stringify({ prompt: text })
                });

                if(response.status === 401) {
                    throw new Error("Token Tidak Valid.");
                }

                const data = await response.json();
                renderBot(data.response);
                fetch('/api/client/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-deq-key': currentToken },
                    body: JSON.stringify({ role: 'bot', message: data.response || '' })
                }).catch(() => {});
            } catch (err) {
                chatBox.innerHTML += `
                    <div class="text-center my-4 text-red-500 text-[10px] font-bold uppercase italic">
                        Koneksi Gagal: ${err.message}
                    </div>
                `;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        document.getElementById('btnClearHistory').onclick = async () => {
            if (!confirm("Hapus semua history chat token ini?")) return;
            try {
                await fetch('/api/client/history', {
                    method: 'DELETE',
                    headers: { 'x-deq-key': currentToken }
                });
                chatBox.innerHTML = `
                    <div class="mb-4">
                        <div class="text-xs text-green-400 font-bold uppercase mb-1">DEQCore AI</div>
                        <div class="bg-gray-700/50 p-3 rounded-lg rounded-tl-none border border-gray-600 text-sm text-gray-200">
                            History berhasil dihapus.
                        </div>
                    </div>
                `;
            } catch (e) {
                alert("Gagal hapus history.");
            }
        };

        document.getElementById('btnExport').onclick = async () => {
            try {
                const res = await fetch('/api/client/history/export', {
                    headers: { 'x-deq-key': currentToken }
                });
                const text = await res.text();
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `deqbot-history-${currentToken}.txt`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            } catch (e) {
                alert("Export gagal.");
            }
        };

        document.getElementById('btnLogout').onclick = () => {
            clearSession();
            location.reload();
        };

        (async function bootstrapSession() {
            const raw = localStorage.getItem(SESSION_KEY);
            if (!raw) return;
            try {
                const saved = JSON.parse(raw);
                if (!saved?.token) return;
                document.getElementById('clientEmail').value = saved.email || "";
                document.getElementById('clientToken').value = saved.token || "";
                currentToken = saved.token;
                openMainSection();
                await loadClientMemory();
            } catch {
                clearSession();
            }
        })();
    </script>
</body>
</html>
