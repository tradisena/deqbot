<script>

    // ========================================
    // INIT SPA MODULE
    // ========================================

    if(!window.skillModuleInitialized){

        window.skillModuleInitialized = true;

        // ========================================
        // FETCH SKILLS
        // ========================================

        async function fetchSkills(){

            try{

                const response =
                await fetch('/api/skills');

                const skills =
                await response.json();

                const skillList =
                document.getElementById(
                    'skillList'
                );

                if(!skillList) return;

                skillList.innerHTML = '';

                // EMPTY

                if(skills.length === 0){

                    skillList.innerHTML =
                    `
                        <div class="text-gray-500 italic">
                            Belum ada modul skill yang dibuat.
                        </div>
                    `;

                    return;

                }

                // LOOP

                skills.forEach(skill=>{

                    const card = `

                        <div class="bg-gray-900/70 p-5 rounded-xl border border-gray-700 hover:border-green-500 transition shadow-md">

                            <div class="flex justify-between items-start mb-3">

                                <h3 class="text-lg font-black text-green-400">
                                    ${skill.name}
                                </h3>

                                <span class="text-[9px] bg-green-900/50 text-green-300 px-2 py-1 rounded uppercase font-black tracking-widest">
                                    Skill Ready
                                </span>

                            </div>

                            <p class="text-white text-xs font-semibold mb-3">
                                ${skill.description}
                            </p>

                            <div class="bg-black/30 rounded-lg p-3 border border-gray-800">

                                <p class="text-gray-400 text-xs italic line-clamp-6">
                                    "${skill.content}"
                                </p>

                            </div>

                        </div>

                    `;

                    skillList.innerHTML += card;

                });

            }catch(error){

                console.error(
                    'Gagal memuat skill:',
                    error
                );

            }

        }

        // ========================================
        // SAVE SKILL
        // ========================================

        async function saveSkill(e){

            e.preventDefault();

            const btn =
            document.getElementById(
                'btnSaveSkill'
            );

            btn.innerText =
            'SAVING...';

            btn.disabled = true;

            const data = {

                name:
                document.getElementById(
                    'skillName'
                ).value,

                description:
                document.getElementById(
                    'skillDesc'
                ).value,

                content:
                document.getElementById(
                    'skillContent'
                ).value

            };

            const statusMsg =
            document.getElementById(
                'statusMsg'
            );

            try{

                const response =
                await fetch(
                    '/api/skills',
                    {
                        method:'POST',
                        headers:{
                            'Content-Type':
                            'application/json'
                        },
                        body:JSON.stringify(
                            data
                        )
                    }
                );

                if(response.ok){

                    statusMsg.innerHTML =
                    '✅ Skill added successfully!';

                    statusMsg.className =
                    'mt-4 text-sm text-green-400 block';

                    document.getElementById(
                        'skillForm'
                    ).reset();

                    // REFRESH

                    await fetchSkills();

                }else{

                    statusMsg.innerHTML =
                    '❌ Failed to add skill.';

                    statusMsg.className =
                    'mt-4 text-sm text-red-400 block';

                }

            }catch(error){

                console.error(
                    'Error:',
                    error
                );

            }

            btn.innerText =
            'Add To Library';

            btn.disabled = false;

        }

        // ========================================
        // INIT
        // ========================================

        setTimeout(()=>{

            fetchSkills();

            const form =
            document.getElementById(
                'skillForm'
            );

            if(form){

                form.addEventListener(
                    'submit',
                    saveSkill
                );

            }

        },100);

    }

</script>
