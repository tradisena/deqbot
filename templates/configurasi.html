<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurasi AI - DEQBOT.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-5">
            <div>
                <h1 class="text-3xl font-bold text-yellow-500">System Configuration</h1>
                <p class="text-gray-400 text-sm">Manage Gemini API Key & Model (Permanent Storage)</p>
            </div>
            <a href="/" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-xs font-bold transition">← BACK TO HOME Dashboard</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                <h2 class="text-lg font-bold mb-6 text-yellow-400">Add / Update Key</h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Google API Key</label>
                        <input type="text" id="geminiKey" placeholder="Paste your key here..."
                            class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-yellow-500 outline-none font-mono">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-2">Model ID</label>
                        <input type="text" id="modelType" placeholder="Contoh: gemini-2.5-flash"
                            class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-yellow-500 outline-none text-yellow-500 font-bold">
                        <p class="text-[10px] text-gray-500 mt-2 italic">
                            Rekomendasi: <b>gemini-2.5-flash</b> (stabil & cepat).
                        </p>
                    </div>

                    <button id="btnSave" class="w-full bg-yellow-600 hover:bg-yellow-500 text-gray-900 font-bold py-3 rounded-xl transition uppercase tracking-widest text-xs">
                        SAVE TO DATABASE
                    </button>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                <h2 class="text-lg font-bold mb-6 text-gray-300">Database Records</h2>
                <div id="keyList" class="space-y-4">
                    <p class="text-gray-500 italic text-sm text-center py-10">Checking Database...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadKeys() {
            try {
                const res = await fetch('/api/settings/gemini/list');
                const data = await res.json();
                const keyList = document.getElementById('keyList');

                if (!data.length || !data[0].key_value) {
                    keyList.innerHTML = '<p class="text-gray-600 italic text-center py-10">Database is empty.</p>';
                    return;
                }

                keyList.innerHTML = data.map(k => `
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                        <p class="text-[10px] text-gray-500 uppercase mb-1">Stored Key</p>
                        <p class="text-xs font-mono text-green-400 break-all mb-4">${k.key_value.substring(0, 10)}****************</p>
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-[9px] text-gray-500 block">Model:</span>
                                <span class="text-xs text-yellow-500 font-bold">${k.model_type || "-"}</span>
                            </div>
                            <button onclick="deleteKey()" class="text-[10px] text-red-500 hover:text-red-400 font-bold uppercase">Delete</button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('modelType').value = data[0].model_type || 'gemini-2.5-flash';
            } catch (err) {
                console.error("Load Failed", err);
            }
        }

        document.getElementById('btnSave').onclick = async () => {
            const key = document.getElementById('geminiKey').value.trim();
            const model = (document.getElementById('modelType').value.trim() || 'gemini-2.5-flash').toLowerCase();

            if (!key) return alert("API key wajib diisi!");

            const res = await fetch('/api/settings/gemini/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: key, model_type: model })
            });

            if (res.ok) {
                alert("✅ Tersimpan Permanen!");
                location.reload();
            } else {
                alert("❌ Gagal simpan.");
            }
        };

        window.deleteKey = async () => {
            if (!confirm("Hapus Key?")) return;
            await fetch('/api/settings/gemini/delete', { method: 'DELETE' });
            location.reload();
        };

        window.onload = loadKeys;
    </script>
</body>
</html>
