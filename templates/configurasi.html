<!-- ========================================
     CONFIGURATION PARTIAL MODULE
========================================= -->

<div class="w-full">

    <!-- HEADER -->

    <div class="mb-6 flex items-center justify-between flex-wrap gap-3">

        <div>

            <h1 class="text-4xl font-black text-yellow-400">
                System Configuration
            </h1>

            <p class="text-gray-400 text-sm mt-1">
                Manage Gemini API Key & AI Hybrid Configuration
            </p>

        </div>

        <!-- NAV -->

        <div class="flex gap-2 flex-wrap">

            <button
                onclick="goDashboard()"
                class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-semibold transition"
            >
                Dashboard
            </button>

        </div>

    </div>

    <!-- GRID -->

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">

        <!-- ========================================
             FORM
        ========================================= -->

        <div class="xl:col-span-5">

            <div class="bg-gray-800/80 p-6 rounded-2xl border border-gray-700 shadow-xl">

                <h2 class="text-2xl font-black mb-6 text-yellow-300 border-b border-gray-700 pb-3">
                    Add / Update Key
                </h2>

                <div class="space-y-5">

                    <!-- API KEY -->

                    <div>

                        <label class="block text-[11px] font-black text-gray-500 uppercase mb-2 tracking-widest">
                            Google API Key
                        </label>

                        <input
                            type="text"
                            id="geminiKey"
                            placeholder="Paste your key here..."
                            class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-yellow-500 outline-none font-mono"
                        >

                    </div>

                    <!-- MODEL -->

                    <div>

                        <label class="block text-[11px] font-black text-gray-500 uppercase mb-2 tracking-widest">
                            Model ID
                        </label>

                        <input
                            type="text"
                            id="modelType"
                            placeholder="Contoh: gemini-2.5-flash"
                            class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:border-yellow-500 outline-none text-yellow-500 font-bold"
                        >

                        <p class="text-[10px] text-gray-500 mt-2 italic">
                            Recommended:
                            <b>gemini-2.5-flash</b>
                            (stable & fast)
                        </p>

                    </div>

                    <!-- BTN -->

                    <button
                        id="btnSave"
                        class="w-full bg-yellow-600 hover:bg-yellow-500 text-gray-900 font-black py-3 rounded-xl transition uppercase tracking-widest text-xs"
                    >
                        SAVE TO DATABASE
                    </button>

                    <!-- STATUS -->

                    <div
                        id="configStatus"
                        class="hidden text-sm"
                    ></div>

                </div>

            </div>

        </div>

        <!-- ========================================
             DATABASE
        ========================================= -->

        <div class="xl:col-span-7">

            <div class="bg-gray-800/80 p-6 rounded-2xl border border-gray-700 shadow-xl min-h-[650px]">

                <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-3">

                    <h2 class="text-2xl font-black text-gray-300">
                        Database Records
                    </h2>

                    <div class="text-[10px] uppercase text-yellow-400 font-bold">
                        LIVE SYSTEM CONFIG
                    </div>

                </div>

                <!-- LIST -->

                <div
                    id="keyList"
                    class="space-y-4"
                >

                    <div class="text-gray-500 italic text-center py-20">
                        Checking Database...
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ========================================
     SCRIPT
========================================= -->

<script>

    // ========================================
    // INIT MODULE
    // ========================================

    if(!window.configModuleInitialized){

        window.configModuleInitialized = true;

        // ========================================
        // LOAD KEYS
        // ========================================

        async function loadKeys(){

            try{

                const res =
                await fetch(
                    '/api/settings/gemini/list'
                );

                const data =
                await res.json();

                const keyList =
                document.getElementById(
                    'keyList'
                );

                // EMPTY

                if(
                    !data.length ||
                    !data[0].key_value
                ){

                    keyList.innerHTML =
                    `
                        <div class="text-gray-600 italic text-center py-20">
                            Database is empty.
                        </div>
                    `;

                    return;

                }

                // LOOP

                keyList.innerHTML =
                data.map(k=>`

                    <div class="bg-gray-900 p-5 rounded-xl border border-gray-800 hover:border-yellow-500 transition">

                        <div class="flex justify-between items-start mb-5">

                            <div>

                                <p class="text-[10px] text-gray-500 uppercase mb-2 tracking-widest">
                                    Stored Key
                                </p>

                                <p class="text-xs font-mono text-green-400 break-all">
                                    ${k.key_value.substring(0,10)}****************
                                </p>

                            </div>

                            <span class="text-[9px] bg-yellow-900/50 text-yellow-300 px-2 py-1 rounded uppercase font-black tracking-widest">
                                ACTIVE
                            </span>

                        </div>

                        <div class="flex justify-between items-center">

                            <div>

                                <span class="text-[9px] text-gray-500 block">
                                    Model
                                </span>

                                <span class="text-xs text-yellow-500 font-bold">
                                    ${k.model_type || '-'}
                                </span>

                            </div>

                            <button
                                onclick="deleteKey()"
                                class="text-[10px] text-red-500 hover:text-red-400 font-black uppercase"
                            >
                                Delete
                            </button>

                        </div>

                    </div>

                `).join('');

                // AUTO FILL

                document.getElementById(
                    'modelType'
                ).value =
                data[0].model_type ||
                'gemini-2.5-flash';

            }catch(err){

                console.error(
                    'Load Failed',
                    err
                );

            }

        }

        // ========================================
        // SAVE KEY
        // ========================================

        document.getElementById(
            'btnSave'
        ).onclick = async ()=>{

            const key =
            document.getElementById(
                'geminiKey'
            ).value.trim();

            const model =
            (
                document.getElementById(
                    'modelType'
                ).value.trim()
                ||
                'gemini-2.5-flash'
            ).toLowerCase();

            const status =
            document.getElementById(
                'configStatus'
            );

            if(!key){

                status.innerHTML =
                '❌ API key wajib diisi';

                status.className =
                'text-red-400 block';

                return;

            }

            try{

                const res =
                await fetch(
                    '/api/settings/gemini/save',
                    {
                        method:'POST',
                        headers:{
                            'Content-Type':
                            'application/json'
                        },
                        body:JSON.stringify({
                            api_key:key,
                            model_type:model
                        })
                    }
                );

                if(res.ok){

                    status.innerHTML =
                    '✅ Configuration saved';

                    status.className =
                    'text-green-400 block';

                    document.getElementById(
                        'geminiKey'
                    ).value = '';

                    await loadKeys();

                }else{

                    status.innerHTML =
                    '❌ Failed save config';

                    status.className =
                    'text-red-400 block';

                }

            }catch(err){

                console.error(err);

            }

        };

        // ========================================
        // DELETE
        // ========================================

        window.deleteKey =
        async ()=>{

            if(
                !confirm(
                    'Delete API Key?'
                )
            ) return;

            await fetch(
                '/api/settings/gemini/delete',
                {
                    method:'DELETE'
                }
            );

            await loadKeys();

        };

        // ========================================
        // INIT
        // ========================================

        setTimeout(()=>{

            loadKeys();

        },100);

    }

</script>
