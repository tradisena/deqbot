<!-- ========================================
     NEWDEQ PARTIAL MODULE
     SPA READY VERSION
========================================= -->

<div class="w-full">

    <!-- HEADER -->

    <div class="mb-6 flex items-center justify-between flex-wrap gap-3">

        <div>

            <h1 class="text-3xl font-black text-blue-400">
                Master Admin: Client Injector
            </h1>

            <p class="text-gray-400 text-sm mt-1">
                Daftarkan klien dan suntikkan Karakter serta Skill pilihan
            </p>

        </div>

        <!-- NAV -->

        <div class="flex gap-2 flex-wrap">

            <button
                onclick="loadModule('/character', null, 'CHARACTER')"
                class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded text-sm font-semibold transition"
            >
                Character Lib
            </button>

            <button
                onclick="loadModule('/skill', null, 'SKILL')"
                class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded text-sm font-semibold transition"
            >
                Skill Lib
            </button>

            <button
                onclick="goDashboard()"
                class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-semibold transition"
            >
                Home
            </button>

        </div>

    </div>

    <!-- GRID -->

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">

        <!-- ========================================
             FORM
        ========================================= -->

        <div class="xl:col-span-5">

            <div class="bg-gray-800/80 border border-gray-700 rounded-2xl p-6 shadow-2xl">

                <h2 class="text-2xl font-black mb-6 text-blue-300 border-b border-gray-700 pb-3 text-center">
                    Registration & Injection Form
                </h2>

                <!-- FORM -->

                <form
                    id="clientForm"
                    class="space-y-4"
                >

                    <!-- BASIC -->

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                        <!-- BOT -->

                        <div>

                            <label class="block text-xs text-gray-400 mb-1">
                                Nama Bot / Peruntukan
                            </label>

                            <input
                                type="text"
                                id="namaBot"
                                placeholder="Bot Sales Roti"
                                required
                                class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none"
                            >

                        </div>

                        <!-- OWNER -->

                        <div>

                            <label class="block text-xs text-gray-400 mb-1">
                                Nama Owner
                            </label>

                            <input
                                type="text"
                                id="namaOwner"
                                placeholder="Fahmi EQ"
                                required
                                class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none"
                            >

                        </div>

                    </div>

                    <!-- EMAIL WA -->

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                        <!-- EMAIL -->

                        <div>

                            <label class="block text-xs text-gray-400 mb-1">
                                Email
                            </label>

                            <input
                                type="email"
                                id="email"
                                placeholder="owner@mail.com"
                                required
                                class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none"
                            >

                        </div>

                        <!-- WA -->

                        <div>

                            <label class="block text-xs text-gray-400 mb-1">
                                WhatsApp
                            </label>

                            <input
                                type="text"
                                id="noWa"
                                placeholder="0812..."
                                required
                                class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none"
                            >

                        </div>

                    </div>

                    <!-- LINE -->

                    <hr class="border-gray-700 my-4">

                    <!-- CHARACTER -->

                    <div>

                        <label class="block text-xs font-black text-purple-400 mb-2 uppercase tracking-wider">
                            Inject Characters (Max 5)
                        </label>

                        <div
                            id="characterSelect"
                            class="bg-gray-900 border border-gray-700 rounded p-3 h-40 overflow-y-auto custom-scrollbar space-y-2 text-xs"
                        >
                            <div class="text-gray-500">
                                Loading Character Library...
                            </div>
                        </div>

                    </div>

                    <!-- SKILL -->

                    <div>

                        <label class="block text-xs font-black text-green-400 mb-2 uppercase tracking-wider">
                            Inject Skills
                        </label>

                        <div
                            id="skillSelect"
                            class="bg-gray-900 border border-gray-700 rounded p-3 h-40 overflow-y-auto custom-scrollbar space-y-2 text-xs"
                        >
                            <div class="text-gray-500">
                                Loading Skill Library...
                            </div>
                        </div>

                    </div>

                    <!-- SOP -->

                    <div>

                        <label class="block text-xs font-black text-orange-400 mb-2 uppercase tracking-wider">
                            Admin SOP Instructions
                        </label>

                        <textarea
                            id="adminInstructions"
                            rows="5"
                            placeholder="Tuliskan aturan baku untuk bot ini..."
                            class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-xs focus:border-orange-500 outline-none"
                        ></textarea>

                    </div>

                    <!-- BTN -->

                    <button
                        type="submit"
                        id="createClientBtn"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-lg transition uppercase tracking-widest text-sm"
                    >
                        Create & Inject Client
                    </button>

                </form>

            </div>

        </div>

        <!-- ========================================
             DATABASE
        ========================================= -->

        <div class="xl:col-span-7">

            <div class="bg-gray-800/80 border border-gray-700 rounded-2xl p-6 shadow-2xl overflow-hidden h-full flex flex-col">

                <!-- TITLE -->

                <div class="flex items-center justify-between mb-6 border-b border-gray-700 pb-3">

                    <h2 class="text-2xl font-black text-gray-300">
                        Active Client Database
                    </h2>

                    <div class="text-[10px] text-green-400 font-bold uppercase">
                        Live Sync
                    </div>

                </div>

                <!-- TABLE -->

                <div class="overflow-auto custom-scrollbar flex-1">

                    <table class="w-full text-left text-xs min-w-[700px]">

                        <thead class="bg-gray-900 text-gray-400 sticky top-0">

                            <tr>

                                <th class="px-4 py-3">
                                    Client/Bot
                                </th>

                                <th class="px-4 py-3">
                                    Token Access
                                </th>

                                <th class="px-4 py-3">
                                    Injections
                                </th>

                                <th class="px-4 py-3">
                                    Status
                                </th>

                            </tr>

                        </thead>

                        <tbody
                            id="clientTableBody"
                            class="divide-y divide-gray-700"
                        >
                            <!-- DATA -->
                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ========================================
     SCRIPT
========================================= -->

<script>

    // ========================================
    // INIT MODULE
    // ========================================

    if(!window.newDeqInitialized){

        window.newDeqInitialized = true;

        // ========================================
        // LOAD LIBRARY
        // ========================================

        async function loadLibraries(){

            try{

                // CHAR

                const charRes =
                await fetch('/api/characters');

                const chars =
                await charRes.json();

                const charDiv =
                document.getElementById(
                    'characterSelect'
                );

                if(charDiv){

                    charDiv.innerHTML =
                    chars.map(c => `

                        <label class="flex items-center space-x-2 p-2 hover:bg-gray-800 rounded cursor-pointer">

                            <input
                                type="checkbox"
                                name="chars"
                                value="${c.name}"
                                class="rounded border-gray-700"
                            >

                            <span>${c.name}</span>

                        </label>

                    `).join('')
                    ||
                    `
                        <p class="text-gray-600 italic">
                            Character Library kosong
                        </p>
                    `;

                }

                // SKILL

                const skillRes =
                await fetch('/api/skills');

                const skills =
                await skillRes.json();

                const skillDiv =
                document.getElementById(
                    'skillSelect'
                );

                if(skillDiv){

                    skillDiv.innerHTML =
                    skills.map(s => `

                        <label class="flex items-center space-x-2 p-2 hover:bg-gray-800 rounded cursor-pointer">

                            <input
                                type="checkbox"
                                name="skills"
                                value="${s.name}"
                                class="rounded border-gray-700"
                            >

                            <span>${s.name}</span>

                        </label>

                    `).join('')
                    ||
                    `
                        <p class="text-gray-600 italic">
                            Skill Library kosong
                        </p>
                    `;

                }

            }catch(err){

                console.error(
                    'Library Error',
                    err
                );

            }

        }

        // ========================================
        // FETCH CLIENT
        // ========================================

        async function fetchClients(){

            try{

                const response =
                await fetch('/api/clients');

                const clients =
                await response.json();

                const tableBody =
                document.getElementById(
                    'clientTableBody'
                );

                if(!tableBody) return;

                tableBody.innerHTML =
                clients.map(c => `

                    <tr class="hover:bg-gray-700/40 transition border-b border-gray-700/50">

                        <!-- CLIENT -->

                        <td class="px-4 py-4">

                            <div class="font-bold text-blue-400 text-sm">
                                ${c.nama_bot}
                            </div>

                            <div class="text-[10px] text-gray-500 mt-1">
                                ${c.nama_owner}
                            </div>

                        </td>

                        <!-- TOKEN -->

                        <td class="px-4 py-4">

                            <div class="font-mono text-green-400 text-[10px] break-all">
                                ${c.token}
                            </div>

                        </td>

                        <!-- INJECTION -->

                        <td class="px-4 py-4">

                            <div class="text-[10px] text-gray-400 max-w-xs">

                                ${c.assigned_characters || 'No Character'}

                                <div class="mt-1 text-gray-600">

                                    ${c.admin_instructions
                                        ? 'SOP ACTIVE'
                                        : 'NO SOP'
                                    }

                                </div>

                            </div>

                        </td>

                        <!-- STATUS -->

                        <td class="px-4 py-4">

                            <span class="bg-green-900/30 text-green-500 px-2 py-1 rounded text-[10px] font-black uppercase">
                                ${c.status}
                            </span>

                        </td>

                    </tr>

                `).join('');

            }catch(err){

                console.error(
                    'Fetch Client Error',
                    err
                );

            }

        }

        // ========================================
        // SUBMIT FORM
        // ========================================

        async function submitClientForm(e){

            e.preventDefault();

            const btn =
            document.getElementById(
                'createClientBtn'
            );

            btn.innerText =
            'CREATING CLIENT...';

            btn.disabled = true;

            // CHARACTER

            const selectedChars =
            Array.from(
                document.querySelectorAll(
                    'input[name="chars"]:checked'
                )
            )
            .map(cb => cb.value)
            .join(', ');

            // SKILL

            const selectedSkills =
            Array.from(
                document.querySelectorAll(
                    'input[name="skills"]:checked'
                )
            )
            .map(cb => cb.value)
            .join(', ');

            // DATA

            const clientData = {

                nama_bot:
                document.getElementById(
                    'namaBot'
                ).value,

                nama_owner:
                document.getElementById(
                    'namaOwner'
                ).value,

                email:
                document.getElementById(
                    'email'
                ).value,

                no_wa:
                document.getElementById(
                    'noWa'
                ).value,

                assigned_characters:
                selectedChars,

                assigned_skills:
                selectedSkills,

                admin_instructions:
                document.getElementById(
                    'adminInstructions'
                ).value

            };

            try{

                const response =
                await fetch(
                    '/api/clients',
                    {
                        method:'POST',
                        headers:{
                            'Content-Type':
                            'application/json'
                        },
                        body:JSON.stringify(
                            clientData
                        )
                    }
                );

                if(response.ok){

                    document.getElementById(
                        'clientForm'
                    ).reset();

                    await loadLibraries();

                    await fetchClients();

                    alert(
                        'Client berhasil dibuat!'
                    );

                }else{

                    alert(
                        'Gagal membuat client'
                    );

                }

            }catch(error){

                console.error(
                    'Create Client Error',
                    error
                );

                alert(
                    'System Error'
                );

            }

            btn.innerText =
            'Create & Inject Client';

            btn.disabled = false;

        }

        // ========================================
        // START MODULE
        // ========================================

        setTimeout(()=>{

            loadLibraries();

            fetchClients();

            const form =
            document.getElementById(
                'clientForm'
            );

            if(form){

                form.addEventListener(
                    'submit',
                    submitClientForm
                );

            }

        },100);

    }

</script>
